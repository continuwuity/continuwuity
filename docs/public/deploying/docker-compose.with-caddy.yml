services:
    caddy:
        image: docker.io/caddy:latest
        ports:
            - 80:80
            - 443:443
            - 8448:8448
        networks:
            - caddy
        volumes:
            - ./data:/data
        restart: unless-stopped
        configs:
            - source: Caddyfile
              target: /etc/caddy/Caddyfile
        
    homeserver:
        image: forgejo.ellis.link/continuwuation/continuwuity:latest
        restart: unless-stopped
        command: /sbin/conduwuit
        volumes:
            - db:/var/lib/continuwuity
            #- ./continuwuity.toml:/etc/continuwuity.toml
        environment:
            CONTINUWUITY_SERVER_NAME: example.com
            CONTINUWUITY_DATABASE_PATH: /var/lib/continuwuity
            CONTINUWUITY_ADDRESS: 0.0.0.0
            CONTINUWUITY_PORT: 8008
            #CONTINUWUITY_CONFIG: '/etc/continuwuity.toml' # Uncomment if you mapped config toml above
        networks:
            - caddy
        configs: # using custom resolvers instead of Docker's
            - source: continuwuity-resolv.conf
              target: /etc/resolv.conf

networks:
    caddy:

volumes:
    db:

configs:
    dynamic.yml:
        content: |
            https://example.com, https://example.com:8448 {
                reverse_proxy http://homeserver:8008
            }

    continuwuity-resolv.conf:
        content: |
            nameserver 1.0.0.1
            nameserver 1.1.1.1
